<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e40af"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="badge" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
    <linearGradient id="busFill" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <linearGradient id="roadGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#334155"/>
      <stop offset="50%" stop-color="#475569"/>
      <stop offset="100%" stop-color="#334155"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background shield -->
  <rect x="20" y="20" width="360" height="360" rx="48" fill="url(#bg)" filter="url(#shadow)"/>
  <rect x="24" y="24" width="352" height="352" rx="44" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>

  <!-- Grid pattern overlay -->
  <g opacity="0.04">
    <line x1="80" y1="30" x2="80" y2="370" stroke="#fff" stroke-width="0.5"/>
    <line x1="160" y1="30" x2="160" y2="370" stroke="#fff" stroke-width="0.5"/>
    <line x1="240" y1="30" x2="240" y2="370" stroke="#fff" stroke-width="0.5"/>
    <line x1="320" y1="30" x2="320" y2="370" stroke="#fff" stroke-width="0.5"/>
    <line x1="30" y1="100" x2="370" y2="100" stroke="#fff" stroke-width="0.5"/>
    <line x1="30" y1="200" x2="370" y2="200" stroke="#fff" stroke-width="0.5"/>
    <line x1="30" y1="300" x2="370" y2="300" stroke="#fff" stroke-width="0.5"/>
  </g>

  <!-- Signal waves -->
  <g filter="url(#glow)">
    <path d="M145 175 Q165 165 185 175" fill="none" stroke="rgba(59,130,246,0.5)" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M133 163 Q165 148 197 163" fill="none" stroke="rgba(59,130,246,0.35)" stroke-width="2" stroke-linecap="round"/>
    <path d="M121 151 Q165 131 209 151" fill="none" stroke="rgba(59,130,246,0.2)" stroke-width="1.5" stroke-linecap="round"/>
  </g>

  <!-- Road -->
  <rect x="80" y="245" width="240" height="36" rx="4" fill="url(#roadGrad)"/>
  <rect x="80" y="259" width="240" height="2" fill="#fbbf24" opacity="0.6"/>
  <!-- Road dashes -->
  <rect x="90" y="261" width="20" height="3" rx="1" fill="#fbbf24" opacity="0.8"/>
  <rect x="120" y="261" width="20" height="3" rx="1" fill="#fbbf24" opacity="0.8"/>
  <rect x="150" y="261" width="20" height="3" rx="1" fill="#fbbf24" opacity="0.8"/>
  <rect x="180" y="261" width="20" height="3" rx="1" fill="#fbbf24" opacity="0.8"/>
  <rect x="210" y="261" width="20" height="3" rx="1" fill="#fbbf24" opacity="0.8"/>
  <rect x="240" y="261" width="20" height="3" rx="1" fill="#fbbf24" opacity="0.8"/>
  <rect x="270" y="261" width="20" height="3" rx="1" fill="#fbbf24" opacity="0.8"/>

  <!-- Bus body -->
  <g filter="url(#glow)">
    <rect x="145" y="195" width="110" height="50" rx="8" fill="url(#busFill)"/>
    <!-- Bus roof -->
    <rect x="150" y="190" width="100" height="8" rx="4" fill="#fcd34d"/>
    <!-- Windows -->
    <rect x="152" y="201" width="22" height="16" rx="3" fill="#1e293b" opacity="0.8"/>
    <rect x="178" y="201" width="22" height="16" rx="3" fill="#1e293b" opacity="0.8"/>
    <rect x="204" y="201" width="22" height="16" rx="3" fill="#1e293b" opacity="0.8"/>
    <!-- Windshield -->
    <rect x="230" y="201" width="20" height="16" rx="3" fill="#38bdf8"/>
    <!-- Headlight -->
    <rect x="249" y="220" width="4" height="10" rx="1" fill="#fef08a"/>
    <!-- Bus stripe -->
    <rect x="145" y="232" width="110" height="3" fill="#d97706" opacity="0.5"/>
    <!-- Wheels -->
    <circle cx="162" cy="250" r="8" fill="#1e293b"/>
    <circle cx="162" cy="250" r="4" fill="#64748b"/>
    <circle cx="238" cy="250" r="8" fill="#1e293b"/>
    <circle cx="238" cy="250" r="4" fill="#64748b"/>
  </g>

  <!-- Top accent badge -->
  <rect x="155" y="75" width="90" height="24" rx="12" fill="url(#badge)" filter="url(#glow)"/>
  <text x="200" y="91" font-family="Arial, sans-serif" font-weight="700" font-size="11" fill="#fff" text-anchor="middle" letter-spacing="1">LIVE TRACKING</text>

  <!-- GTU-ITR text -->
  <text x="200" y="135" font-family="Arial, sans-serif" font-weight="800" font-size="36" fill="#fff" text-anchor="middle" letter-spacing="3">
    GTU-ITR
  </text>

  <!-- Subtitle -->
  <text x="200" y="158" font-family="Arial, sans-serif" font-weight="400" font-size="12" fill="#93c5fd" text-anchor="middle" letter-spacing="4">
    BUS TRACKING SYSTEM
  </text>

  <!-- Bottom decorative dots -->
  <circle cx="160" cy="308" r="3" fill="#3b82f6" opacity="0.6"/>
  <circle cx="180" cy="308" r="2" fill="#3b82f6" opacity="0.4"/>
  <circle cx="200" cy="308" r="3" fill="#3b82f6" opacity="0.6"/>
  <circle cx="220" cy="308" r="2" fill="#3b82f6" opacity="0.4"/>
  <circle cx="240" cy="308" r="3" fill="#3b82f6" opacity="0.6"/>

  <!-- Version badge -->
  <rect x="165" y="320" width="70" height="20" rx="10" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.1)" stroke-width="0.5"/>
  <text x="200" y="333" font-family="Arial, sans-serif" font-weight="500" font-size="9" fill="rgba(255,255,255,0.5)" text-anchor="middle">v2.0.0</text>
</svg>
